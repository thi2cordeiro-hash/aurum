<style>
  * { margin:0;padding:0;box-sizing:border-box; }
  html,body { width:100%;height:100%;background:#124456; }

    display:flex;flex-direction:column;align-items:center;
    justify-content:center;height:100vh;gap:0;
  }
  .logo {
    width:100px;height:100px;border-radius:24px;overflow:hidden;

  }

  .fill { height:100%;background:#97D8C4;border-radius:2px;animation:load 3.5s ease forwards; }
  @keyframes load { from{width:0} to{width:100%} }
  .btn {
    margin-top:1.6rem;
    background:#97D8C4;color:#124456;
    font-family:sans-serif;font-size:.9rem;font-weight:700;
    padding:.65rem 2rem;border-radius:10px;
    border:none;cursor:pointer;text-decoration:none;
    display:inline-block;letter-spacing:.02em;
  }
  .btn:hover { background:#7fcab6; }
</style>
